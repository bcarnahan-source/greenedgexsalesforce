<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <!-- Dark background -->
  <rect width="300" height="80" rx="4" fill="#14321c"/>
  <!-- "GreenEdge" in bold italic brush style -->
  <text x="150" y="50" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="900" font-style="italic" fill="#FFF200" text-anchor="middle" letter-spacing="-1">GreenEdge</text>
  <!-- Underline swoosh accent -->
  <path d="M60 56 Q150 68 240 54" fill="none" stroke="#5cb85c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tagline -->
  <text x="150" y="73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.8)" letter-spacing="3" text-anchor="middle">LAWN &amp; LANDSCAPE</text>
</svg>
